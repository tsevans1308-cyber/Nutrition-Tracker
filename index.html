<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nutrition Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --surface3: #2a2a2a;
      --border: #2e2e2e; --text: #f0f0f0; --muted: #888; --muted2: #555;
      --accent: #f59e0b; --accent-dim: rgba(245,158,11,0.12); --accent-dim2: rgba(245,158,11,0.22);
      --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.15);
      --font: 'IBM Plex Mono', monospace; --nav-w: 220px;
      --radius: 12px; --radius-sm: 8px; --radius-xs: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 10; }
    .auth-box { width: 100%; max-width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .auth-logo svg { color: var(--accent); }
    .auth-logo-text { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; }
    .auth-logo-sub { font-size: 10px; color: var(--muted); }
    .auth-field { margin-bottom: 12px; }
    .auth-field label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.05em; }
    .auth-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color .15s; }
    .auth-field input:focus { border-color: var(--accent); }
    .auth-btn { width: 100%; padding: 11px; background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
    .auth-btn:hover { opacity: 0.88; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .auth-tab { flex: 1; padding: 9px; background: transparent; border: none; color: var(--muted); font-family: var(--font); font-size: 11px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: background .15s, color .15s; }
    .auth-tab.active { background: var(--accent); color: #000; font-weight: 600; }
    .auth-tab:not(.active):hover { background: var(--surface2); color: var(--text); }
    .auth-msg { margin-top: 12px; font-size: 11px; min-height: 16px; text-align: center; }
    .auth-msg.error { color: var(--red); }
    .auth-msg.success { color: var(--green); }
    #app-screen { display: none; height: 100vh; flex-direction: column; }
    #app-screen.visible { display: flex; }
    #side-nav { display: none; }
    #bottom-nav { display: flex; flex-direction: row; align-items: stretch; background: var(--surface); border-top: 1px solid var(--border); height: 60px; flex-shrink: 0; z-index: 100; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; color: var(--muted); font-family: var(--font); font-size: 10px; letter-spacing: 0.03em; cursor: pointer; transition: color .15s; padding: 8px 0; }
    .nav-btn svg { opacity: 0.5; transition: opacity .15s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active svg { opacity: 1; }
    #tab-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 0 16px 0; -webkit-overflow-scrolling: touch; }
    @media (min-width: 768px) {
      #app-screen { flex-direction: row; }
      #bottom-nav { display: none; }
      #side-nav { display: flex; flex-direction: column; width: var(--nav-w); background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; flex-shrink: 0; }
      .side-nav-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
      .side-nav-logo svg { color: var(--accent); }
      .side-nav-logo-text { font-size: 13px; font-weight: 600; }
      .side-nav-btn { display: flex; align-items: center; gap: 12px; padding: 11px 20px; background: none; border: none; color: var(--muted); font-family: var(--font); font-size: 12px; letter-spacing: 0.03em; cursor: pointer; transition: all .15s; text-align: left; width: 100%; }
      .side-nav-btn svg { opacity: 0.5; transition: opacity .15s; flex-shrink: 0; }
      .side-nav-btn:hover { color: var(--text); background: var(--surface2); }
      .side-nav-btn:hover svg { opacity: 0.8; }
      .side-nav-btn.active { color: var(--accent); background: var(--accent-dim); }
      .side-nav-btn.active svg { opacity: 1; }
      .side-nav-bottom { margin-top: auto; padding: 12px 20px; border-top: 1px solid var(--border); }
      .side-nav-user { font-size: 10px; color: var(--muted); margin-bottom: 8px; word-break: break-all; }
      .side-nav-signout { background: none; border: 1px solid var(--border); color: var(--muted); font-family: var(--font); font-size: 10px; padding: 6px 10px; border-radius: var(--radius-xs); cursor: pointer; transition: all .15s; width: 100%; letter-spacing: 0.03em; }
      .side-nav-signout:hover { border-color: var(--red); color: var(--red); }
      #tab-content { flex: 1; }
      .tab-inner { max-width: 680px; }
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); transition: background .3s; position: fixed; top: 14px; right: 16px; z-index: 200; }
    .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
    .sync-dot.error { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    @media (min-width: 768px) { .sync-dot { top: 18px; right: 24px; } }
    .tab-pane { display: none; animation: fadeIn .15s ease; }
    .tab-pane.active { display: block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }
    .tab-inner { padding: 20px 16px 0; margin: 0 auto; }
    @media (min-width: 768px) { .tab-inner { padding: 28px 32px 0; } }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .card + .card { margin-top: 12px; }
    .progress-row { margin-bottom: 12px; }
    .progress-row:last-child { margin-bottom: 0; }
    .progress-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .progress-name { font-size: 11px; color: var(--muted); letter-spacing: 0.03em; }
    .progress-vals { font-size: 11px; }
    .progress-track { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width .4s cubic-bezier(.4,0,.2,1), background .3s; }
    .fill-blue { background: var(--blue); }
    .fill-amber { background: var(--accent); }
    .fill-red { background: var(--red); }
    .ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 0 16px; }
    .ring-track { fill: none; stroke: var(--surface2); stroke-width: 14; }
    .ring-fill { fill: none; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1), stroke .3s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    .ring-cal-num { font-family: var(--font); font-weight: 600; font-size: 26px; fill: var(--text); }
    .ring-cal-target { font-family: var(--font); font-size: 11px; fill: var(--muted); }
    .ring-cal-label { font-family: var(--font); font-size: 10px; fill: var(--muted); letter-spacing: 0.08em; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 16px 0; }
    @media (min-width: 768px) { .dash-header { padding: 28px 32px 0; } }
    .dash-date { font-size: 13px; font-weight: 500; }
    .day-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; padding: 5px 10px; border-radius: 99px; cursor: pointer; transition: all .15s; border: 1px solid; }
    .day-badge.training { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .day-badge.rest { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
    .meal-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .meal-row:last-child { border-bottom: none; padding-bottom: 0; }
    .meal-row-left { display: flex; align-items: center; gap: 8px; }
    .meal-chevron { transition: transform .2s; color: var(--muted2); }
    .meal-chevron.open { transform: rotate(90deg); }
    .meal-name { font-size: 12px; font-weight: 500; }
    .meal-cal { font-size: 11px; color: var(--muted); }
    .supp-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .supp-pill { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: var(--font); font-size: 11px; cursor: pointer; transition: all .15s; }
    .supp-pill.checked { background: var(--accent-dim2); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .weight-widget { display: flex; align-items: center; justify-content: space-between; }
    .weight-main { font-size: 22px; font-weight: 600; }
    .weight-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .weight-trend { font-size: 11px; margin-top: 4px; }
    .trend-up { color: var(--red); }
    .trend-down { color: var(--green); }
    .btn-sm { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 11px; padding: 7px 12px; border-radius: var(--radius-xs); cursor: pointer; transition: all .15s; }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .avg-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .avg-chip { background: var(--surface2); border-radius: var(--radius-xs); padding: 7px 10px; flex: 1; min-width: 70px; text-align: center; }
    .avg-chip-val { font-size: 13px; font-weight: 600; display: block; }
    .avg-chip-label { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .meal-section { margin-bottom: 8px; }
    .meal-section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; cursor: pointer; }
    .meal-section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
    .meal-section-summary { font-size: 10px; color: var(--muted); }
    .log-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-item:last-child { border-bottom: none; }
    .log-item-left { flex: 1; min-width: 0; }
    .log-item-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-item-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .log-item-macros { font-size: 10px; color: var(--muted2); margin-top: 1px; }
    .log-item-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 10px; }
    .log-item-cal { font-size: 12px; font-weight: 500; white-space: nowrap; }
    .delete-btn { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; transition: color .15s; }
    .delete-btn:hover { color: var(--red); }
    .add-meal-btn { display: flex; align-items: center; gap: 6px; width: 100%; background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--muted); font-family: var(--font); font-size: 11px; padding: 10px 14px; cursor: pointer; transition: all .15s; margin-top: 8px; }
    .add-meal-btn:hover { border-color: var(--accent); color: var(--accent); }
    .empty-state { padding: 24px 0; text-align: center; color: var(--muted); font-size: 11px; }
    .lib-cat-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; cursor: pointer; border-bottom: 1px solid var(--border); }
    .lib-cat-title { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; color: var(--accent); text-transform: uppercase; }
    .lib-cat-count { font-size: 10px; color: var(--muted); }
    .lib-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .lib-item:hover .lib-item-name { color: var(--accent); }
    .lib-item:last-child { border-bottom: none; }
    .lib-item-name { font-size: 12px; font-weight: 500; transition: color .15s; }
    .lib-item-base { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .lib-item-macros { font-size: 10px; color: var(--muted2); text-align: right; line-height: 1.7; }
    .settings-section { margin-bottom: 24px; }
    .toggle-row { display: flex; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; width: fit-content; }
    .toggle-opt { padding: 7px 16px; border-radius: var(--radius-xs); border: none; background: none; color: var(--muted); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all .15s; }
    .toggle-opt.active { background: var(--surface); color: var(--text); font-weight: 600; }
    .targets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .targets-card { background: var(--surface2); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
    .targets-card-title { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .target-field { margin-bottom: 10px; }
    .target-field:last-child { margin-bottom: 0; }
    .target-field label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.03em; }
    .target-field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 7px 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color .15s; }
    .target-field input:focus { border-color: var(--accent); }
    .weight-table { width: 100%; border-collapse: collapse; }
    .weight-table th { font-size: 10px; color: var(--muted); font-weight: 500; text-align: left; padding: 6px 0; border-bottom: 1px solid var(--border); letter-spacing: 0.04em; }
    .weight-table td { font-size: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .weight-table tr:last-child td { border-bottom: none; }
    .weight-input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .weight-input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color .15s; }
    .weight-input-row input:focus { border-color: var(--accent); }
    .btn-accent { background: var(--accent); color: #000; border: none; font-family: var(--font); font-size: 12px; font-weight: 600; padding: 9px 18px; border-radius: var(--radius-sm); cursor: pointer; transition: opacity .15s; white-space: nowrap; }
    .btn-accent:hover { opacity: 0.88; }
    .btn-accent:active { opacity: 0.75; }
    .btn-danger { background: none; border: 1px solid var(--border); color: var(--muted); font-family: var(--font); font-size: 11px; padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; }
    .btn-danger:hover { border-color: var(--red); color: var(--red); }
    .danger-row { display: flex; gap: 10px; flex-wrap: wrap; }
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: flex-end; justify-content: center; z-index: 500; backdrop-filter: blur(4px); }
    #modal-overlay.open { display: flex; }
    @media (min-width: 768px) { #modal-overlay { align-items: center; } }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp .2s ease; overflow: hidden; }
    @media (min-width: 768px) { .modal-box { border-radius: var(--radius); max-height: 80vh; } }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1} }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-title { font-size: 14px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1; transition: color .15s; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .modal-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; margin-bottom: 12px; transition: border-color .15s; }
    .modal-search:focus { border-color: var(--accent); }
    .modal-cat-filters { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; scrollbar-width: none; }
    .modal-cat-filters::-webkit-scrollbar { display: none; }
    .cat-filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: var(--font); font-size: 10px; padding: 5px 10px; border-radius: 99px; cursor: pointer; white-space: nowrap; transition: all .15s; }
    .cat-filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .modal-item-list { max-height: 240px; overflow-y: auto; }
    .modal-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .modal-item:last-child { border-bottom: none; }
    .modal-item:hover .modal-item-name { color: var(--accent); }
    .modal-item.selected { background: var(--accent-dim); margin: 0 -4px; padding: 10px 4px; border-radius: var(--radius-xs); }
    .modal-item-name { font-size: 12px; font-weight: 500; transition: color .15s; }
    .modal-item-base { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .modal-item-cal { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .modal-gram-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .modal-gram-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.03em; }
    .modal-gram-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: var(--font); font-size: 18px; font-weight: 600; outline: none; transition: border-color .15s; margin-bottom: 10px; }
    .modal-gram-input:focus { border-color: var(--accent); }
    .modal-nl-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none; transition: border-color .15s; }
    .modal-nl-input:focus { border-color: var(--accent); }
    .modal-nl-note { font-size: 10px; color: var(--muted); margin-top: 5px; min-height: 14px; }
    .macro-preview { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 14px; }
    .macro-preview-chip { background: var(--surface2); border-radius: var(--radius-xs); padding: 8px; text-align: center; }
    .macro-preview-val { font-size: 14px; font-weight: 600; display: block; }
    .macro-preview-label { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .edit-field { margin-bottom: 12px; }
    .edit-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.03em; }
    .edit-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color .15s; }
    .edit-field input:focus { border-color: var(--accent); }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); font-family: var(--font); font-size: 11px; padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .modal-footer-row { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
    .wt-modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text); font-family: var(--font); font-size: 24px; font-weight: 600; outline: none; text-align: center; margin-bottom: 8px; }
    .wt-modal-note { font-size: 11px; color: var(--muted); text-align: center; }
    ::-webkit-scrollbar { width: 4px; }

function setSyncing(v) {

function uid_user() { return state.user ? state.user.id : null; }

async function pullFromSupabase() {
  const uid = uid_user(); if (!uid) return;
  setSyncing(true);
  try {
    const [{data:tgt},{data:sett},{data:logs},{data:wts},{data:supps},{data:ovr}] = await Promise.all([
      _supa.from('targets').select('*').eq('user_id',uid).maybeSingle(),
      _supa.from('settings').select('*').eq('user_id',uid).maybeSingle(),
      _supa.from('log_entries').select('*').eq('user_id',uid),
      _supa.from('weight_log').select('*').eq('user_id',uid).order('date',{ascending:true}),
      _supa.from('supplements').select('*').eq('user_id',uid),
      _supa.from('library_overrides').select('*').eq('user_id',uid),
    ]);
    if (tgt) store.set('nutritionApp_targets', JSON.stringify({calories:tgt.rest_cal,protein:tgt.rest_protein,carbs:tgt.rest_carbs,fat:tgt.rest_fat,trainingCalories:tgt.training_cal,trainingProtein:tgt.training_protein,trainingCarbs:tgt.training_carbs,trainingFat:tgt.training_fat}));
    if (sett) store.set('nutritionApp_dayType', sett.day_type);
    if (logs && logs.length) {
      const byDate = {};
      logs.forEach(e => { if (!byDate[e.date]) byDate[e.date]=[]; byDate[e.date].push({id:e.id,itemKey:e.item_key,name:e.name,grams:e.grams,cal:e.cal,protein:e.protein,carbs:e.carbs,fat:e.fat,meal:e.meal,timestamp:e.timestamp}); });
      store.set('nutritionApp_log', JSON.stringify(byDate));
    }
    if (wts && wts.length) store.set('nutritionApp_weightLog', JSON.stringify(wts.map(w=>({date:w.date,weight:w.weight}))));
    if (supps && supps.length) { const sd={}; supps.forEach(s=>{sd[s.date]=s.items;}); store.set('nutritionApp_supplements', JSON.stringify(sd)); }
    if (ovr && ovr.length) { const od={}; ovr.forEach(o=>{od[o.item_key]={baseGrams:o.base_grams,cal:o.cal,protein:o.protein,carbs:o.carbs,fat:o.fat};}); store.set('nutritionApp_libraryOverrides', JSON.stringify(od)); }
  } catch(e) { console.warn('Pull error', e); }
  setSyncing(false);
}

function formatDate(str) { return new Date(str+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}); }
function uid() { return typeof crypto!=='undefined'&&crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2); }
function calcTotals(entries) { return entries.reduce((t,e)=>({cal:t.cal+e.cal,protein:t.protein+e.protein,carbs:t.carbs+e.carbs,fat:t.fat+e.fat}),{cal:0,protein:0,carbs:0,fat:0}); }
function scaleItem(item, qty) { const s=qty/item.baseGrams; return {cal:item.cal*s,protein:item.protein*s,carbs:item.carbs*s,fat:item.fat*s}; }
function barColor(pct) { return pct>1?'fill-red':pct>=0.8?'fill-amber':'fill-blue'; }
function barWidth(pct) { return Math.min(pct*100,100).toFixed(1)+'%'; }
function fmt(n) { return parseFloat(n).toFixed(1); }
function fmtCal(n) { return Math.round(n).toLocaleString(); }
function calcSevenDayAvg() {
  const log=db.getAllLog(), days=[];
  for (let i=1;i<=7;i++) { const d=new Date(); d.setDate(d.getDate()-i); const k=toDateStr(d); if(log[k]&&log[k].length) days.push(calcTotals(log[k])); }
  if (!days.length) return null;
  const n=days.length;
  return {cal:days.reduce((s,d)=>s+d.cal,0)/n,protein:days.reduce((s,d)=>s+d.protein,0)/n,carbs:days.reduce((s,d)=>s+d.carbs,0)/n,fat:days.reduce((s,d)=>s+d.fat,0)/n,days:n};
}
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function parseNL(text, base) {
  const t=text.toLowerCase().trim(); if (!t) return {grams:base,note:null};
  if (/\b(half|smaller|small portion)\b/.test(t)) return {grams:Math.round(base*0.5),note:null};
  if (/\b(double|large|big portion)\b/.test(t))   return {grams:Math.round(base*2),note:null};
  const eG=t.match(/\b(?:extra|add)\s+(\d+(?:\.\d+)?)\s*g\b/); if(eG) return {grams:Math.round(base+parseFloat(eG[1])),note:null};
  const sG=t.match(/^(\d+(?:\.\d+)?)\s*g$/); if(sG) return {grams:parseFloat(sG[1]),note:null};
  if (/^extra$/.test(t)) return {grams:Math.round(base*1.25),note:null};
  if (/^less$/.test(t))  return {grams:Math.round(base*0.75),note:null};
  return {grams:base,note:"couldn't parse, using default"};
}

    :{cal:targets.calories,protein:targets.protein,carbs:targets.carbs,fat:targets.fat};
  const todayLog=db.getLog(today), totals=calcTotals(todayLog);
  const supps=db.getSupplements(today);
  const wl=db.getWeightLog(), lastW=wl.length?wl[wl.length-1]:null, prevW=wl.length>1?wl[wl.length-2]:null;
  const avg=calcSevenDayAvg();
  const calPct=t.cal>0?totals.cal/t.cal:0;

function openModal(html) { document.getElementById('modal-box').innerHTML=html; document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); state.modal=null; }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function openAddItemModal(meal) {
  state.modal='add-item';
  state.modalState={meal,selectedKey:null,grams:null,catFilter:'all',search:''};
  renderAddItemModal();
}
function renderAddItemModal() {
  const {meal,selectedKey,catFilter,search}=state.modalState;
  const filtered=Object.entries(FOOD_LIBRARY).filter(([,item])=>(catFilter==='all'||item.category===catFilter)&&(!search||item.name.toLowerCase().includes(search.toLowerCase())));
  const selectedItem=selectedKey?getEffectiveItem(selectedKey):null;
  const grams=state.modalState.grams??(selectedItem?selectedItem.baseGrams:null);
  const macros=selectedItem&&grams!=null?scaleItem(selectedItem,grams):null;
  openModal(`
    <div class="modal-header"><span class="modal-title">Add to ${MEAL_LABELS[meal]}</span><button class="modal-close" onclick="closeModal()">&#xD7;</button></div>
    <div class="modal-body">
      <input class="modal-search" type="text" placeholder="Search foods..." value="${search}" oninput="onModalSearch(this.value)" autocomplete="off">
      <div class="modal-cat-filters">${CATEGORIES.map(c=>`<button class="cat-filter-btn ${catFilter===c.key?'active':''}" onclick="onModalCatFilter('${c.key}')">${c.label}</button>`).join('')}</div>
      <div class="modal-item-list">
        ${filtered.length===0?'<div class="empty-state">No items found</div>':filtered.map(([key,item])=>{const eff=getEffectiveItem(key);return`<div class="modal-item ${selectedKey===key?'selected':''}" onclick="onSelectModalItem('${key}')"><div><div class="modal-item-name">${item.name}</div><div class="modal-item-base">${item.isCount?'x 1':eff.baseGrams+'g'}</div></div><span class="modal-item-cal">${fmtCal(eff.cal)} cal</span></div>`;}).join('')}
      </div>
      ${selectedItem?`
        <div class="modal-gram-section">
          <div class="modal-gram-label">${selectedItem.isCount?'QUANTITY':'GRAMS'}</div>
          <input class="modal-gram-input" type="number" inputmode="decimal" id="modal-gram-input" value="${grams}" min="0.1" step="${selectedItem.isCount?1:10}" oninput="onModalGramsChange(this.value)">
          <input class="modal-nl-input" type="text" placeholder="e.g. double, half, extra 50g..." oninput="onModalNL(this.value)" autocomplete="off">
          <div class="modal-nl-note" id="modal-nl-note"></div>
          <div class="macro-preview">
            <div class="macro-preview-chip"><span class="macro-preview-val" id="mpv-cal">${macros?fmtCal(macros.cal):'—'}</span><span class="macro-preview-label">CAL</span></div>
            <div class="macro-preview-chip"><span class="macro-preview-val" id="mpv-prot">${macros?fmt(macros.protein)+'g':'—'}</span><span class="macro-preview-label">PROT</span></div>
            <div class="macro-preview-chip"><span class="macro-preview-val" id="mpv-carbs">${macros?fmt(macros.carbs)+'g':'—'}</span><span class="macro-preview-label">CARBS</span></div>
            <div class="macro-preview-chip"><span class="macro-preview-val" id="mpv-fat">${macros?fmt(macros.fat)+'g':'—'}</span><span class="macro-preview-label">FAT</span></div>
          </div>
        </div>`:''}
    </div>
    ${selectedItem?`<div class="modal-footer"><button class="btn-accent" style="width:100%" onclick="confirmAddItem()">Add to Log</button></div>`:''}
  `);
  if (!selectedKey) setTimeout(()=>{const s=document.querySelector('.modal-search');if(s)s.focus();},50);
}
function onModalSearch(v) { state.modalState.search=v; state.modalState.selectedKey=null; state.modalState.grams=null; renderAddItemModal(); }
function onModalCatFilter(cat) { state.modalState.catFilter=cat; state.modalState.selectedKey=null; state.modalState.grams=null; renderAddItemModal(); }
function onSelectModalItem(key) { state.modalState.selectedKey=key; state.modalState.grams=getEffectiveItem(key).baseGrams; renderAddItemModal(); }
function onModalGramsChange(v) {
  const g=parseFloat(v); state.modalState.grams=isNaN(g)?0:g;
  const item=getEffectiveItem(state.modalState.selectedKey); if(!item) return;
  const m=scaleItem(item,state.modalState.grams);
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set('mpv-cal',fmtCal(m.cal)); set('mpv-prot',fmt(m.protein)+'g'); set('mpv-carbs',fmt(m.carbs)+'g'); set('mpv-fat',fmt(m.fat)+'g');
}
function onModalNL(v) {
  const item=getEffectiveItem(state.modalState.selectedKey);
  const base=item?item.baseGrams:(state.modalState.grams??0);
  const result=parseNL(v,base);
  const noteEl=document.getElementById('modal-nl-note'); if(noteEl) noteEl.textContent=result.note||'';
  const gi=document.getElementById('modal-gram-input'); if(gi){gi.value=result.grams;onModalGramsChange(result.grams);}
}
function confirmAddItem() {
  const {meal,selectedKey,grams}=state.modalState; if(!selectedKey||!grams||grams<=0) return;
  const item=getEffectiveItem(selectedKey), macros=scaleItem(item,grams);
  const entry={id:uid(),itemKey:selectedKey,name:item.name,grams:parseFloat(grams),cal:macros.cal,protein:macros.protein,carbs:macros.carbs,fat:macros.fat,meal,timestamp:Date.now()};
  const entries=db.getLog(state.today); entries.push(entry);
  db.setLog(state.today,entries); closeModal(); renderActiveTab(); showToast('Added '+item.name);
}

function saveLibraryItem(key) {
  const f=id=>parseFloat(document.getElementById(id).value);
  const [bg,cal,prot,carbs,fat]=['edit-baseGrams','edit-cal','edit-protein','edit-carbs','edit-fat'].map(f);
  if([bg,cal,prot,carbs,fat].some(isNaN)) return;
  db.setLibraryOverride(key,{baseGrams:bg,cal,protein:prot,carbs,fat});
  closeModal(); renderLibrary(); showToast('Item updated');

  if(!confirm('Reset to default values?')) return;
  db.resetLibraryOverride(key); closeModal(); renderLibrary(); showToast('Reset to default');
}

      <div class="wt-modal-note">kg${last?' &middot; Last: '+last.weight+' kg':''}</div>
    </div>
    <div class="modal-footer"><button class="btn-accent" style="width:100%" onclick="confirmLogWeight()">Save</button></div>
  `);
  setTimeout(()=>{const i=document.getElementById('wt-input');if(i)i.focus();},100);
}
function confirmLogWeight() {
  const v=parseFloat(document.getElementById('wt-input').value); if(isNaN(v)||v<=0) return;
  const wl=db.getWeightLog(), idx=wl.findIndex(e=>e.date===state.today);
  if(idx>=0) wl[idx].weight=v; else wl.push({date:state.today,weight:v});
  wl.sort((a,b)=>a.date.localeCompare(b.date));
  db.setWeightLog(wl); closeModal(); renderDashboard(); showToast('Weight logged: '+v+' kg');
}

function toggleDayType() { db.setDayType(db.getDayType()==='training'?'rest':'training'); renderActiveTab(); }
function setDayType(t) { db.setDayType(t); renderSettings(); if(state.activeTab==='dashboard') renderDashboard(); }
function toggleMealOpen(meal) { state.mealOpen[meal]=!state.mealOpen[meal]; renderActiveTab(); }
function toggleLibCat(cat) { state.libCatOpen[cat]=!state.libCatOpen[cat]; renderLibrary(); }
function toggleSupp(name) {
  const supps=db.getSupplements(state.today), idx=supps.indexOf(name);
  if(idx>=0) supps.splice(idx,1); else supps.push(name);
  db.setSupplements(state.today,supps); renderDashboard();
}
function deleteLogEntry(date,id) {
  db.setLog(date,db.getLog(date).filter(e=>e.id!==id));
  renderActiveTab(); renderDashboard();
}
function saveTargets() {
  const t=db.getTargets();
  ['calories','protein','carbs','fat'].forEach(f=>{const el=document.getElementById('rest_'+f);if(el)t[f]=parseFloat(el.value)||t[f];});
  ['trainingCalories','trainingProtein','trainingCarbs','trainingFat'].forEach(k=>{const el=document.getElementById(k);if(el)t[k]=parseFloat(el.value)||t[k];});
  db.setTargets(t); if(state.activeTab==='dashboard') renderDashboard(); showToast('Targets saved');
}
function logWeightFromSettings() {
  const v=parseFloat(document.getElementById('settings-weight-input').value); if(isNaN(v)||v<=0) return;
  const wl=db.getWeightLog(), idx=wl.findIndex(e=>e.date===state.today);
  if(idx>=0) wl[idx].weight=v; else wl.push({date:state.today,weight:v});
  wl.sort((a,b)=>a.date.localeCompare(b.date));
  db.setWeightLog(wl); renderSettings(); showToast('Weight logged: '+v+' kg');
}
function clearTodayLog() {
  if(!confirm('Clear all entries for today?')) return;
  db.setLog(state.today,[]); renderActiveTab(); renderDashboard(); showToast("Today's log cleared");
}
function clearAllData() {
  if(!confirm('Delete ALL data? This cannot be undone.')) return;
  ['nutritionApp_targets','nutritionApp_dayType','nutritionApp_log','nutritionApp_weightLog','nutritionApp_supplements','nutritionApp_libraryOverrides'].forEach(k=>store.del(k));
  renderActiveTab(); renderDashboard(); showToast('All data cleared');
}

function switchTab(tab) {
  state.activeTab=tab; state.today=toDateStr(new Date());
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn,.side-nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('tab-content').scrollTop=0;
  renderActiveTab();
}
function renderActiveTab() {
  try {
    switch(state.activeTab) {
      case 'dashboard': renderDashboard(); break;
      case 'log':       renderLog();       break;
      case 'library':   renderLibrary();   break;
      case 'settings':  renderSettings();  break;
    }
  } catch(err) {
    const el=document.getElementById('tab-'+state.activeTab);
    if(el) el.innerHTML=`<div style="padding:24px;color:var(--red);font-size:12px">Error: ${err.message}</div>`;
    console.error(err);
  }
}

let authMode = 'signin';
function setAuthMode(mode) {
  authMode = mode;
  document.getElementById('auth-tab-signin').classList.toggle('active', mode==='signin');
  document.getElementById('auth-tab-signup').classList.toggle('active', mode==='signup');
  document.getElementById('auth-btn').textContent = mode==='signin' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-msg').textContent = '';
}
async function handleAuth() {
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const msgEl=document.getElementById('auth-msg'); msgEl.className='auth-msg'; msgEl.textContent='';
  const btn=document.getElementById('auth-btn'); btn.textContent='...'; btn.disabled=true;
  const {data,error} = authMode==='signin'
    ? await _supa.auth.signInWithPassword({email,password})
    : await _supa.auth.signUp({email,password});
  btn.disabled=false; btn.textContent=authMode==='signin'?'Sign In':'Create Account';
  if (error) { msgEl.className='auth-msg error'; msgEl.textContent=error.message; return; }
  if (authMode==='signup' && !data.session) {
    msgEl.className='auth-msg success'; msgEl.textContent='Check your email to confirm your account, then sign in.'; return;
  }
  if (data.user) launchApp(data.user);
}

async function launchApp(user) {
  state.user = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('visible');
  const emailEl = document.getElementById('side-user-email');
  if (emailEl) emailEl.textContent = user.email;
  await pullFromSupabase();
  state.today = toDateStr(new Date());
  renderDashboard();
}

async function signOut() {
  await _supa.auth.signOut();
  state.user = null;
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
}

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('auth-tab-signin').addEventListener('click', () => setAuthMode('signin'));
  document.getElementById('auth-tab-signup').addEventListener('click', () => setAuthMode('signup'));
  document.getElementById('auth-btn').addEventListener('click', handleAuth);
  document.getElementById('auth-password').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });
  const {data:{session}} = await _supa.auth.getSession();
  if (session?.user) { launchApp(session.user); return; }
  _supa.auth.onAuthStateChange((event, session) => {
    if (event==='SIGNED_IN' && session?.user && !state.user) launchApp(session.user);
  });
});
</script>
